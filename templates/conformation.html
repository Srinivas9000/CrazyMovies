<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#222;
padding:40px;
border-radius:10px;
text-align:center;
}

h1{
color:#00ff88;
}

a{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:red;
color:white;
text-decoration:none;
border-radius:5px;
}
/* Tablet */
@media (max-width:768px){
.container{
   width:95%;
}

.seats{
   grid-template-columns:repeat(8,1fr);
}
}

/* Mobile */
@media (max-width:480px){
.seats{
   grid-template-columns:repeat(6,1fr);
}

button{
   padding:10px;
   font-size:14px;
}
}
</style>

</head>

<body>

<div class="box">

<h1>🎉 Booking Confirmed!</h1>

<p>Your movie ticket has been booked successfully.</p>

<p>Enjoy your show 🍿</p>

<a href="/home/">Go to Home</a>

</div>

</body>
</html>
