{% load static %} 
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ movie.title }}</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

/* MAIN CONTAINER */

.container{
  display:flex;
  max-width:1000px;
  margin:auto;
  padding:40px;
  background:#2c2c2c;
  border-radius:10px;
}

/* LEFT SIDE */

.left{
  width:40%;
}

/* RIGHT SIDE */

.right{
  width:60%;
  padding-left:40px;
}

/* POSTER */

.poster img{
  width:220px;
  border-radius:10px;
}

/* TRAILER */

.trailer-section{
  margin-top:20px;
}

.trailer-section h3{
  color:#fe0404;
}

/* WATCH BUTTON */

.watch-btn{
  background:red;
  color:white;
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.watch-btn:hover{
  background:darkred;
}

/* AVAILABLE SHOWS */

.shows{
  margin-top:25px;
}

.book-btn{
  padding:12px 25px;
  background:#e50914;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.book-btn:hover{
  background:#b40710;
}

/* DETAILS */

.details h1{
  color:#e50914;
}

/* CAST */

.cast-section{
  margin-top:30px;
}

.cast-grid{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}

/* CAST ROW MODEL */

.cast-card{
  display:flex;
  align-items:center;
  gap:15px;
  width:260px;
}

/* ROUND IMAGE */

.cast-card img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
}

/* ACTOR TEXT */

.cast-info p{
  margin:0;
  font-weight:bold;
}

.cast-info small{
  color:#aaa;
}

/* RESPONSIVE */

@media(max-width:768px){

.container{
  flex-direction:column;
}

.left,.right{
  width:100%;
  padding:0;
}

}

</style>

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<div class="poster">
<img src="{{ movie.poster.url }}">
</div>

<div class="trailer-section">

<h3>Trailer</h3>

<select id="languageSelect">
<option>Telugu</option>
<option>Hindi</option>
<option>Tamil</option>
<option>Korean</option>
</select>

<br><br>

<button 
class="watch-btn"
data-trailer="{{ movie.trailer_url }}"
onclick="openTrailer(this)">
▶ Watch Trailer
</button>

</div>

<!-- AVAILABLE SHOWS MOVED HERE -->

<div class="shows">

<h3>Available Shows</h3>

<a href="{% url 'funky' movie.id %}">
<button class="book-btn">Book Now</button>
</a>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<div class="details">

<h1>{{ movie.title }}</h1>

<p><b>Language:</b> {{ movie.language }}</p>
<p><b>Duration:</b> {{ movie.duration }} mins</p>

<p><b>Synopsis</b></p>

<div class="desc">
{{ movie.description }}
</div>

</div>

<!-- CAST -->

<div class="cast-section">

<h3>Cast</h3>

<div class="cast-grid">

{% for member in cast %}

<div class="cast-card">

<img src="{{ member.image.url }}">

<div class="cast-info">
<p>{{ member.name }}</p>
<small>{{ member.role }}</small>
</div>

</div>

{% endfor %}

</div>

</div>

</div>

</div>

<script src="{% static 'js/cast.js' %}"></script>

</body>
</html>
