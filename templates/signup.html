<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <style>
        body{background: url("/static/images/bg5.jpg");color:white;font-family:Arial;text-align:center}
        .box{background:#222;width:300px;margin:auto;margin-top:100px;padding:20px;border-radius:10px}
        input,button{width:90%;padding:10px;margin:10px 0;border-radius:5px;border:none}
        button{background:#e50914;color:white;font-size:16px}
        /* Tablet */
@media (max-width:768px){
.container{
   width:95%;
}

.seats{
   grid-template-columns:repeat(8,1fr);
}
}

/* Mobile */
@media (max-width:480px){
.seats{
   grid-template-columns:repeat(6,1fr);
}

button{
   padding:10px;
   font-size:14px;
}
}
    </style>
</head>
<body>

<div class="box">
    <h2>Signup</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Create Account</button>
    </form>
    <p>Already have account? <a href="/login/" style="color:#0f0;">Login</a></p>
</div>

</body>
</html>
